# DigitalOcean App Platform — SPA client routes (e.g. /vendor/upload/:id) need a catch-all.
#
# FIX 404 ON REFRESH (must be set on the deployed app):
# 1) Control Panel: Apps → your app → Settings → pick the Static Site component (not a Web Service).
# 2) Find "Custom Pages" (or similar) → Edit → Catchall / catch-all document → `index.html` → Save.
# 3) Redeploy. Test: curl -sI "https://<app>.ondigitalocean.app/vendor/upload/test" — expect HTTP 200.
#
# CLI: doctl apps spec get <APP_ID> > spec.yaml
#     Add under static_sites[-1]:  catchall_document: index.html
#     doctl apps update <APP_ID> --spec spec.yaml
#
# This file is a template; replace `github` / `name` / `region` with your repo, or merge only
# `catchall_document: index.html` into your live spec if the app already exists.

name: vendor-portal
region: nyc

static_sites:
  - name: web
    environment_slug: node-js
    github:
      repo: thecloudbade/vendor-portal
      branch: main
      deploy_on_push: true
    build_command: npm ci && npm run build
    source_dir: /
    output_dir: dist
    catchall_document: index.html
